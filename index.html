<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Professional Branded Page Identity -->
    <title>Secure QR Incentive Portal</title>
    <meta name="description" content="Secure, mathematically unique QR code incentive and claim tracking system." />

    <!-- CRITICAL SEO & BOT CRAWLER PROTECTION -->
    <!-- Forces search engines to never index or archive claim links, preventing leakage of QR tokens in search results -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow, noarchive" />

    <!-- Open Graph (Facebook, WhatsApp, Telegram, Slack) Sharing Cards -->
    <meta property="og:title" content="Secure QR Incentive Portal" />
    <meta property="og:description" content="Scan your QR code to claim your incentive rewards instantly." />
    <meta property="og:type" content="website" />

    <!-- Twitter Cards Meta Tags -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Secure QR Incentive Portal" />
    <meta name="twitter:description" content="Claim your incentive rewards with mathematically verified safety." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
